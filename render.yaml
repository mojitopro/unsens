services:
  - type: web
    name: unsens
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm && pnpm install --no-frozen-lockfile
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MOJITO_API_KEY
        value: mojito_secret_123
        sync: false
      - key: OLLAMA_HOST
        sync: false
      - key: OLLAMA_MODEL
        value: qwen2.5-coder:7b
