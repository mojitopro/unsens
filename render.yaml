services:
  - type: web
    name: unsens
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    dockerCommand: sh -c "ollama serve & sleep 10 && ollama pull dolphin3:8b 2>/dev/null || true && node dist/index.js"
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MOJITO_API_KEY
        value: mojito_secret_123
        sync: false
      - key: OLLAMA_MODEL
        value: dolphin3:8b
